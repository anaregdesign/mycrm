name: Release Container Image

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: mycrm

jobs:
  publish:
    name: Build And Publish To ACR
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Validate ACR deployment configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_CONTAINER_REGISTRY_NAME" || { echo "Missing environment variable AZURE_CONTAINER_REGISTRY_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr build \
              --registry "$AZURE_CONTAINER_REGISTRY_NAME" \
              --image "${IMAGE_NAME}:${{ github.event.release.tag_name }}" \
              --image "${IMAGE_NAME}:sha-${{ github.sha }}" \
              .

  deploy:
    name: Deploy Release To Azure Container Apps
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ !github.event.release.prerelease }}
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
      AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      IMAGE_REF: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/mycrm:${{ github.event.release.tag_name }}
    steps:
      - name: Validate release deployment configuration
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "Missing environment variable AZURE_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "Missing environment variable AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "Missing environment variable AZURE_SUBSCRIPTION_ID"; exit 1; }
          test -n "$AZURE_RESOURCE_GROUP" || { echo "Missing environment variable AZURE_RESOURCE_GROUP"; exit 1; }
          test -n "$AZURE_CONTAINER_APP_NAME" || { echo "Missing environment variable AZURE_CONTAINER_APP_NAME"; exit 1; }
          test -n "$AZURE_CONTAINER_REGISTRY_NAME" || { echo "Missing environment variable AZURE_CONTAINER_REGISTRY_NAME"; exit 1; }

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy immutable release image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --image "$IMAGE_REF"

      - name: Smoke test deployed release
        uses: azure/cli@v2
        with:
          inlineScript: |
            FQDN="$(az containerapp show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --query properties.configuration.ingress.fqdn \
              -o tsv)"

            curl --fail --silent --show-error --max-time 30 "https://${FQDN}/health"